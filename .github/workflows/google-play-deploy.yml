name: Deploy to Google Play

on:
  push:
    branches:
      - main
      - deployment/google-play # Permitimos pruebas desde esta rama también

jobs:
  deploy:
    name: Build and Submit to Play Store
    runs-on: ubuntu-latest
    steps:
      - name: 🏗 Checkout repository
        uses: actions/checkout@v4

      - name: 🏗 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 🏗 Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 8

      - name: 🏗 Setup Expo
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: 📦 Install dependencies
        run: pnpm install

      - name: 🚀 Build and Submit
        run: |
          # Usamos --non-interactive para evitar bloqueos
          # EAS usará las credenciales guardadas en su servidor si ya se configuraron
          # o usará el google-play-key.json si está presente y referenciado en eas.json
          npx eas-cli build --profile production --auto-submit --non-interactive
